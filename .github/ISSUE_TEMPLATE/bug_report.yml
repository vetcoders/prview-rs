name: Bug Report
description: Report a bug in prview
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: prview version
      description: Output of `prview --version`
      placeholder: "prview 0.1.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: OS name and version
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Output of `rustc --version` (if building from source)
      placeholder: "rustc 1.85.0"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `prview --quick` in a repo with ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error output if applicable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or any other relevant information.
    validations:
      required: false
